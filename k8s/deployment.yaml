apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: python-app

  template:
    metadata:
      labels:
        app: python-app

    spec:
      containers:
      - name: python-app

        image: kapilkhurana89/python-cicd-app:v1

        ports:
        - containerPort: 5000